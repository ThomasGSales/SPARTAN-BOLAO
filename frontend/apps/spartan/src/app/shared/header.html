<div class="mb-6 flex items-center justify-between gap-3">
  <!-- Navegação -->
  <nav class="glass inline-flex items-center gap-1 rounded-full p-1">
    <a
      routerLink="/jogos" routerLinkActive="bg-spartan-600 text-white shadow-neon-soft"
      class="rounded-full px-4 py-1.5 text-sm font-semibold text-zinc-400 transition hover:text-white"
    >Jogos</a>
    <a
      routerLink="/ranking" routerLinkActive="bg-spartan-600 text-white shadow-neon-soft"
      class="rounded-full px-4 py-1.5 text-sm font-semibold text-zinc-400 transition hover:text-white"
    >Ranking</a>
  </nav>

  <!-- Usuário -->
  @if (user(); as u) {
    <div class="flex items-center gap-2">
      @if (u.avatarUrl) {
        <img [src]="u.avatarUrl" [alt]="u.name" class="h-8 w-8 rounded-full ring-1 ring-white/15" />
      } @else {
        <div class="flex h-8 w-8 items-center justify-center rounded-full bg-spartan-700 text-sm font-bold text-white">
          {{ u.name.charAt(0).toUpperCase() }}
        </div>
      }
      <span class="hidden text-sm text-zinc-300 sm:inline">{{ u.name }}</span>
      <button
        type="button" title="Sair"
        class="inline-flex items-center gap-1 rounded-full border border-white/10 px-3 py-1.5 text-xs
               text-zinc-400 transition hover:border-spartan-600/50 hover:text-spartan-300"
        (click)="logout()"
      >
        <mat-icon class="!h-4 !w-4 !text-base">logout</mat-icon>
        <span class="hidden sm:inline">Sair</span>
      </button>
    </div>
  }
</div>
