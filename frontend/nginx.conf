server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: toda rota desconhecida volta pro index (Angular Router)
    location / {
        try_files $uri $uri/ /index.html;
        # Libera o popup do Google Sign-In a devolver a credencial via postMessage
        # (sem isso o navegador bloqueia com "Cross-Origin-Opener-Policy ... postMessage").
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }

    # Proxy das chamadas /api para o backend Spring Boot
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache agressivo para assets com hash
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
